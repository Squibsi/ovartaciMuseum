<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
      rel="stylesheet"
    />
    <!--Fan icon-->
    <link rel="icon" href="img/fan-icon.png" type="img/icon" />
    <link rel="stylesheet" href="../tablet/tablet-css/tablet-style.css" />
    <title>Hvordan Fungere Dette | Museum Ovartaci</title>
  </head>
  <body>
    <!-- Header med logo og navigation -->
    <header class="howHeader">
      <div class="logo">
        <img src="../img/logo.png" alt="Museum Ovartaci logo" class="logoImg" />
        <h1>MUSEUM OVARTACI</h1>
      </div>
      <nav class="howNav">
        <img src="../img/home-icon.png" alt="Hjem" class="navIcon" />
        <img src="../img/back-icon.png" alt="Tilbage" class="navIcon" />
      </nav>
    </header>

    <main class="howMain">
      <h2>HVORDAN FUNGERE DETTE?</h2>
      <p class="howText">
        På din telefon kan du gå ind på <strong>www.Ovartaci/DrømMed.dk</strong
        ><br />
        Find de forskellige puslespilsbrikker rundt på museet og scan dem.
      </p>

      <!-- Video-område (placeholder – du indsætter video senere) -->
      <div class="video-container">
        <!-- 
        Når du har videoen, kan du erstatte dette med en <video>- eller YouTube-indlejring.
        Eksempel med en lokal mp4-fil:
        <video controls width="100%">
          <source src="video/vejledning.mp4" type="video/mp4">
          Din browser understøtter ikke video.
        </video>
      -->
        <div class="video-placeholder">🎥 Videovejledning kommer snart</div>
      </div>

      <button id="understoodBtn" class="Btnunderstood">Forstået</button>
    </main>

    <script src="js/hvordan-script.js"></script>
  </body>
</html>
