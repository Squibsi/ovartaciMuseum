<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
      rel="stylesheet"
    />
    <!--Fan icon-->
    <link rel="icon" href="img/fan-icon.png" type="img/icon" />
    <link rel="stylesheet" href="../tablet/tablet-css/tutorial.css" />
    <title>Hvordan Fungere Dette | Museum Ovartaci</title>
  </head>
  <body>
    <!-- Header med logo og navigation -->
    <header class="navigationHeader">
      <div class="logo">
        <img src="../img/logo.png" alt="Museum Ovartaci logo" class="logoImg" />
        <img src="../img/house.svg" alt="Hjem" class="navIcon" id="homeIcon" />
      </div>
      <div class="redLine"></div>
    </header>

    <main class="howMain">
      <h2>HVORDAN FUNGERE DETTE?</h2>
      <p class="howText">
        På din telefon kan du gå ind på <strong>www.Ovartaci/DrømMed.dk</strong
        ><br />
        Find de forskellige puslespilsbrikker rundt på museet og scan dem.
      </p>

      <!-- Video-område -->
      <div class="videoContainer">
        <!-- 
         Her kommer en video, der viser
      -->
        <div class="videoPlaceholder">🎥 Videovejledning kommer snart</div>
      </div>

      <button id="understoodBtn" class="Btnunderstood">Forstået</button>

      <img
        src="../img/back-arrow.svg"
        alt="Tilbage"
        class="navIcon"
        id="backIcon"
      />
    </main>

    <script src="../tablet/js-tablet/tablet-tutorial.js"></script>
  </body>
</html>
