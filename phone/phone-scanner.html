<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="phone-css/phone-scanner-style.css">
     <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inria+Sans:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap" rel="stylesheet">
    <!--Fan icon-->
     <link rel="icon" href="img/fanIcon.png" type="img/icon">
     <link rel="stylesheet" href="../css/phoneStyle.css">
    <title>Scanner</title>
</head>
<body>
    <!-- Tekst til skærmen -->
    <div id="puzzleProgressText">
        <h1>Find QR-koderne <br> i museets områder</h1>
        <p>0/7 fundet</p>
    </div>

    <!-- Billederne til puslespillet -->
    <div id="puzzleProgressImg">
        <img id="puzzleBrain" src="../img/hjerne-knapper-uden-brug.svg" alt="hvide hjerne brikker">
        <img id="bottomBrainPiece" src="../img/blank-brain1.svg" alt="bund hjernebrik">
        <img id="middleBrainPiece" src="../img/blank-brain2.svg" alt="midterste hjernebrik">
        <img id="bottomLeftBrainPiece" src="../img/blank-brain6.svg" alt="venstre bund hjernebrik">
    </div>

    <!-- Knapper -->
    <div id="mainBtns">
        <button id="startScannerBtn">Start scanner</button>
        <button id="generateCodeBtn">Generér min kode</button>
    </div>
</body>
</html>
